services:
  openhands:
    image: ghcr.io/all-hands-ai/openhands
    networks:
      - openhands
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - ${OPENHANDS_PORT-5000}:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./settings:/.openhands
      - ${OPENHANDS_WORKSPACE-./workspace}:/opt/workspace_base
    environment:
      SANDBOX_USER_ID: ${UID-1000}
      SANDBOX_NETWORK: openhands
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ghcr.io/all-hands-ai/runtime:main-nikolaik
      LLM_BASE_URL: http://vllm:8000/v1
      LLM_MODEL: openai/Qwen/Qwen2.5-Coder-32B-Instruct-AWQ
      LLM_API_KEY: key
      OPENINFERENCE_OTLP_ENDPOINT: http://phoenix:4317
      PHOENIX_PROJECT_NAME: OpenHands

  vllm:
    image: vllm/vllm-openai:v0.18.0
    command: >
      Qwen/Qwen2.5-Coder-32B-Instruct-AWQ
      --kv-cache-dtype fp8
      --max-model-len 16384
      --max-num-seqs 2
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --uvicorn-log-level warning
    networks:
      - openhands
    ports:
      - ${VLLM_PORT-8000}:8000
    volumes:
      - ./models:/root/.cache/huggingface
    environment:
      CUDA_VISIBLE_DEVICES: 0
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['0']

  phoenix:
    image: arizephoenix/phoenix
    networks:
      - openhands
    ports:
      - ${PHOENIX_PORT-5001}:6006
      - ${PHOENIX_OTLP_PORT-4317}:4317
    volumes:
      - phoenix-data:/data
    environment:
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: 6006
      PHOENIX_WORKING_DIR: /data

networks:
  openhands:

volumes:
  phoenix-data:
