services:
  openhands:
    image: ghcr.io/all-hands-ai/openhands
    networks:
      - openhands
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - ${OPENHANDS_PORT-3000}:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./settings:/.openhands
      - ${OPENHANDS_WORKSPACE-./workspace}:/opt/workspace_base
    environment:
      SANDBOX_USER_ID: ${UID-1000}
      SANDBOX_NETWORK: openhands
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ghcr.io/all-hands-ai/runtime:main-nikolaik
      LLM_BASE_URL: http://vllm:${VLLM_PORT-8000}/v1
      LLM_MODEL: openai/Qwen/Qwen2.5-Coder-32B-Instruct-AWQ
      LLM_API_KEY: key
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: pk-lf-key
      LANGFUSE_SECRET_KEY: sk-lf-key

  vllm:
    image: vllm/vllm-openai:v0.6.3.post1
    command: >
      --model Qwen/Qwen2.5-Coder-32B-Instruct-AWQ
      --kv-cache-dtype fp8
      --max-model-len 16384
      --max-num-seqs 4
      --enable-prefix-caching
      --enable-chunked-prefill
      --gpu-memory-utilization 0.90
      --uvicorn-log-level warning
    networks:
      - openhands
    ports:
      - ${VLLM_PORT-8000}:8000
    volumes:
      - ./models:/root/.cache/huggingface
    environment:
      VLLM_ATTENTION_BACKEND: FLASHINFER
      CUDA_VISIBLE_DEVICES: 0
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['0']

  langfuse:
    image: langfuse/langfuse
    networks:
      - openhands
    ports:
      - ${LANGFUSE_PORT-3001}:3000
    environment:
      DATABASE_URL: postgresql://langfuse:password@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT-3001}
      NEXTAUTH_SECRET: secret
      SALT: salt
      LANGFUSE_INIT_ORG_NAME: Example
      LANGFUSE_INIT_USER_EMAIL: admin@example.com
      LANGFUSE_INIT_USER_PASSWORD: password
      LANGFUSE_INIT_PROJECT_NAME: OpenHands
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-key
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-key

  langfuse-postgres:
    image: postgres:18
    networks:
      - openhands
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: password

networks:
  openhands:
    driver: bridge

volumes:
  langfuse-postgres-data:
