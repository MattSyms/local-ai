services:
  ollama:
    image: ollama/ollama
    tty: true
    ports:
      - ${OLLAMA_PORT-11434}:11434
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - ${OPEN_WEBUI_PORT-5001}:8080
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      USE_CUDA_DOCKER: false
      WEBUI_AUTH: false
      ENABLE_SIGNUP: false
      ENABLE_OLLAMA_API: true
      OLLAMA_BASE_URL: http://ollama:11434

volumes:
  ollama-data:
  open-webui-data:
