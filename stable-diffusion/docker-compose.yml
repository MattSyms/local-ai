services:
  webui:
    build:
      context: ./webui
    ports:
      - ${WEBUI_PORT-7860}:7860
    volumes:
      - ./data:/home/ubuntu/stable-diffusion-webui/data
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['0']
